spring.datasource.url=jdbc:h2:mem:arq_software
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
    
# Credenciais AWS Dinâmicas
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
spring.cloud.aws.region.static=us-east-1

# Filas
queue.order-events=arn:aws:sqs:us-east-1:814369619254:T03N_EDUARDO_RUBEL_CANAVARRO.fifo
aws.sqs.queue.entrada-estoque=arn:aws:sqs:us-east-1:814369619254:T03N_EDUARDO_RUBEL_CANAVARRO.fifo
    
    
